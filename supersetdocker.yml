version: '3.8'

services:
  db:
    image: postgres:15
    container_name: superset_db
    restart: always
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset_password
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: superset_redis
    restart: always
    volumes:
      - redis_data:/data

  superset:
    image: apache/superset:latest
    container_name: superset_app
    restart: always
    ports:
      - "8088:8088"
    environment:
      # CRITICAL: Change this to a long random string
      SUPERSET_SECRET_KEY: 'YOUR_VERY_LONG_RANDOM_STRING_HERE'
      DATABASE_URI: 'postgresql://superset:superset_password@db:5432/superset'
      REDIS_HOST: redis
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
  superset_home:
